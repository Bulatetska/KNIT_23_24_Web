<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Django</title>
    </head>
    <body>
        {%if message%}
            <h2>{{message}}</h2>
        {%endif%}
        
        <table>
            <form method='post'>
                {% csrf_token %}
                {{ form }}
                
                <p><input type="submit" value="Send" ></p> 
            </form>
        </table>
    </body>
</html>
