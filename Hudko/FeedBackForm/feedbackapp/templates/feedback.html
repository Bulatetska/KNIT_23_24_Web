<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Зворотний зв'язок</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="number"], textarea {
            width: 100%; padding: 8px; box-sizing: border-box;
        }
        textarea { height: 100px; resize: vertical; }
        
        .rating-input { 
            border: 2px solid #4CAF50; 
            background-color: #f9fdf9;
            font-size: 16px;
        }
        
        .errorlist { color: red; list-style-type: none; padding: 0; margin: 5px 0 0 0; font-size: 14px; }
        .success { color: green; font-weight: bold; margin-bottom: 15px; }
        
        button { padding: 10px 15px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Залиште свій відгук</h2>

    {% if success_message %}
        <div class="success">{{ success_message }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                
                {% if field.errors %}
                    <ul class="errorlist">
                        {% for error in field.errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit">Відправити</button>
    </form>

</body>
</html>
