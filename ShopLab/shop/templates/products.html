<!DOCTYPE html>
<html>
<head>
    <title>Список товарів</title>
    <style>
        table { border-collapse: collapse; width: 50%; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h2>Наші товари</h2>
    <table>
        <thead>
            <tr>
                <th>Назва товару</th>
                <th>Ціна</th>
                <th>Кількість на складі</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.price }} $</td>
                <td>
                    {% if item.stock > 0 %}
                        {{ item.stock }}
                    {% else %}
                        <strong>Немає в наявності</strong>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
