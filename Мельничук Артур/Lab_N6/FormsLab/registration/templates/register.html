<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Реєстрація</title>
</head>
<body>
    <h1>Реєстрація</h1>

    {% if message %}
        <p><strong>{{ message }}</strong></p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зареєструватись</button>
    </form>
</body>
</html>
