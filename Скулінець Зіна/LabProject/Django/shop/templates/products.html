<!DOCTYPE html>
<html>
<head>
    <title>Список товарів</title>
</head>
<body>
    <h2>Товари в наявності</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Назва товару</th>
                <th>Ціна</th>
                <th>Кількість</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.price }}</td>
                <td>
                    {% if item.stock == 0 %}
                        <strong>Немає в наявності</strong>
                    {% else %}
                        {{ item.stock }}
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
