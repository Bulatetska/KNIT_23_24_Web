{% extends 'shop/base.html' %}

{% block title %}Реєстрація{% endblock %}

{% block header %}Форма реєстрації{% endblock %}

{% block content %}
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="padding: 5px 15px; cursor: pointer;">Зареєструватися</button>
    </form>

    {% if message %}
        <div style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;">
            <strong>Статус:</strong> {{ message }}
        </div>
    {% endif %}
{% endblock %}
