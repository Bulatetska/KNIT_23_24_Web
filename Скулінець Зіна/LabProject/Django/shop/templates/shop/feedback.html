{% extends 'shop/base.html' %}

{% block content %}
<h2>Зворотний зв'язок</h2>

{% if success %}
    <p style="color: green; font-weight: bold;">Дякуємо! Ваш відгук збережено у файлі.</p>
{% endif %}

<form method="post" style="max-width: 500px;">
    {% csrf_token %}
    
    {% for field in form %}
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div style="color: red; font-size: 0.8em;">
                    {{ field.errors }}
                </div>
            {% endif %}
        </div>
    {% endfor %}
    
    <button type="submit">Відправити відгук</button>
</form>
{% endblock %}
