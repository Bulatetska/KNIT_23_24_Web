<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Товари</title>
</head>
<body>
    <h1>Список товарів</h1>

    <table border="1">
        <tr>
            <th>Назва товару</th>
            <th>Ціна</th>
            <th>Кількість на складі</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.price }}</td>
            <td>
                {% if item.stock == 0 %}
                    Немає в наявності
                {% else %}
                    {{ item.stock }}
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
