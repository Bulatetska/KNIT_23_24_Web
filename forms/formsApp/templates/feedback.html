<form method="post" class="custom-form">
    {% csrf_token %}
    
    {% for field in form %}
        <div class="field-wrapper">
            <label>{{ field.label }}</label>
            {{ field }}
            
            {% if field.errors %}
                <ul class="errors">
                    {% for error in field.errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        </div>
    {% endfor %}
    
    <button type="submit">Надіслати</button>
</form>
