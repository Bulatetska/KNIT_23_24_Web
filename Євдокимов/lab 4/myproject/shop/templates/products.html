<!DOCTYPE html>
<html>
<head>
    <title>Список товарів</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Список товарів</h2>

<table>
    <tr>
        <th>Назва товару</th>
        <th>Ціна</th>
        <th>Кількість на складі</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item.name }}</td>
        <td>{{ item.price }}</td>
        <td>
            {% if item.stock == 0 %}
                Немає в наявності
            {% else %}
                {{ item.stock }}
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
