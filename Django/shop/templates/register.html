{% extends 'base.html' %}

{% block title %}Реєстрація{% endblock %}
{% block header %}Форма реєстрації{% endblock %}

{% block content %}
    {% if message %}
        <p><strong>{{ message }}</strong></p>
    {% endif %}

    <form method="post">
        {% csrf_token %} 
        {{ form.as_p }} 
        <button type="submit">Зареєструватися</button>
    </form>
{% endblock %}
