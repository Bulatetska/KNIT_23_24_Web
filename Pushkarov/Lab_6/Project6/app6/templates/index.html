<!DOCTYPE html>
<html>
<head>
 <meta charset="utf-8" />
 <title>Django</title>
</head>
<body>
 <form method="post">
    {% csrf_token %}
        
        {% for field in form %}
            <p>
                {{ field.label_tag }} <br>
                {{ field }}
            </p>
        {% endfor %}

        <button type="submit">Надіслати</button>

        {% if message %}
            <div style="color: red; margin-top: 10px;">
                {{ message }}
                {% if form.non_field_errors %}
                    <br> {{ form.non_field_errors.0 }}
                {% endif %}
            </div>
        {% endif %}
</form>
</form>
</body>
</html>
