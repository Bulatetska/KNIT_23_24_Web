<!DOCTYPE html>
<html>
<head>
 <title>Django</title>
 <meta charset="utf-8" />
 <style>
     table {
         width: 100%;
         border-collapse: collapse;
     }
     th, td {
         border: 1px solid #ddd;
         padding: 8px;
     }
     th {
         background-color: #f2f2f2;
     }
    td{
        background-color: aquamarine;
    }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Назва товару</th>
            <th>Ціна</th>
            <th>Кількість на складі</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.price }}</td>
            <td>
                {% if item.stock > 0 %}
                    {{ item.stock }}
                {% else %}
                    Немає в наявності
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
