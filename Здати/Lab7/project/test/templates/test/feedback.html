<!DOCTYPE html>
<html>
<head>
 <meta charset="utf-8" />
 <title>Django Forms</title>

 </style>
</head>
<body>
<div class="container">
  <h2>Feedback Form</h2>
{% if success %}
<p class="success">Дані успішно збережено</p>
{% endif %}
{% if errors %}
<div class="errors">
  <ul>
    {% for error in errors %}
    <li>{{ error }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}     
<form method="POST">
  {% csrf_token %}
  {% for field in form %}
  <div class="form-group">
    {{ field.label_tag }}
    <div>{{ field }}</div>
    <div class="errors">{{ field.errors }}</div>
  </div>
  {% endfor %}
  <button type="submit">Send</button>
</form>
</div>
</body>
</html>
