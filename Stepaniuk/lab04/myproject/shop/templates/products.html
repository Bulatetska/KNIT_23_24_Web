<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Список товарів</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Список товарів</h2>

<table>
    <tr>
        <th>Назва товару</th>
        <th>Ціна</th>
        <th>Кількість на складі</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item.name }}</td>
        <td>{{ item.price }}</td>
        <td>
            {% if item.stock == 0 %}
                Немає в наявності
            {% else %}
                {{ item.stock }}
            {% endif %}
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
