<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Форма зворотного зв'язку</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            width: 420px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .input-field,
        .textarea-field,
        .rating-input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #bbb;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .rating-input {
            border: 2px solid #4CAF50;
            background-color: #f0fff0;
        }

        button {
            padding: 10px 16px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .message {
            margin-bottom: 15px;
            font-weight: bold;
        }

        .errors {
            color: red;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Форма зворотного зв'язку</h1>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    {% if errors %}
        <div class="errors">
            <ul>
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
            </div>
        {% endfor %}

        <button type="submit">Надіслати</button>
    </form>

</body>
</html>
